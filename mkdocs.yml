# Generated scaffold — the nav block is produced from tmp/gen_docs.py.
# Re-run that generator (or edit nav here directly once content stabilizes).
site_name: Agent Eval Harness
site_description: >-
  Evaluation framework for Claude Code skills and agent capabilities, built on MLflow.
site_url: https://opendatahub-io.github.io/agent-eval-harness/
repo_url: https://github.com/opendatahub-io/agent-eval-harness
repo_name: opendatahub-io/agent-eval-harness
edit_uri: edit/main/website/
docs_dir: website
copyright: Copyright &copy; Red Hat, Inc. — Licensed under Apache-2.0

theme:
  name: material
  # Fonts are self-hosted (see website/stylesheets/extra.css); disable the
  # Google Fonts CDN loader.
  font: false
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - search.suggest
    - search.highlight
    - search.share
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  # Python API autodoc. Enabled in CI (which runs `pip install -e .`).
  # Add `::: agent_eval.<module>` directives on reference/python-api.md to use it.
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            separate_signature: true
            merge_init_into_class: true

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/opendatahub-io/agent-eval-harness

