            required: true
            description: "Pre-built task container image (registry/repo:tag)"
          execution_mode:
            type: string
            default: kubernetes
            description: "Execution mode: kubernetes (K8s Jobs) or harbor (local Docker)"
          agent:
            type: string
            default: oracle
            description: "Harbor agent name (oracle, claude-code, etc.)"
          model:
            type: string
            description: "Model identifier (e.g. anthropic/claude-sonnet-4-6)"
          namespace:
            type: string
            default: evalhub
            description: "Namespace for K8s Job execution"
          timeout_sec:
            type: integer
            default: 600
            description: "Task timeout in seconds"
        metrics:
          - reward
          - mean_reward
          - duration_seconds
          - env_build_seconds
          - agent_exec_seconds
          - verifier_seconds
          - cost_usd
          - input_tokens
          - output_tokens
