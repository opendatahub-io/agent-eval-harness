prompt: "# fix: maasmodelref endpoint selection in setups with multiple gateways available\n\
  \nhttps://redhat.atlassian.net/browse/RHOAIENG-52336\n\n## Description\nIn `getEndpointFromLLMISvc`,\
  \ when multiple gateways exist, `llmisvc.Status.Addresses` contains gateway-external\
  \ entries from **ALL** gateways. The method picks the first HTTPS available, which\
  \ may belong to the wrong gateway (e.g., `openshift-ai-inference` instead of `maas-default-gateway`).\n\
  \nThe proposed fix:\n- In `providers_llmisvc.go` \u2014 `getEndpointFromLLMISvc`\
  \ now accepts `expectedHostnames`. When non-empty, it filters gateway-external addresses\
  \ to only those whose hostname matches, and skips fallback to unfiltered addresses\
  \ (which may belong to the wrong gateway, how we do it now, essentially). When empty,\
  \ old behavior is preserved for single-gateway deployments.\n- Additionally, added\
  \ 7 test cases covering `providers_llmisvc.go`. Testing the following scenarios:\
  \ \n   1) correct hostname selected from multiple gateways\n   2) no match returns\
  \ empty\n   3) legacy behavior without hostnames\n   4) single gateway with hostnames\n\
  \   5) fallback to first address with old logic \n   6) no fallback when filtering\
  \ \n   7) HTTPS preference\n\n## How Has This Been Tested?\nAdded unit tests to\
  \ make the changes work as intended.\n\n## Merge criteria:\n<!--- This PR will be\
  \ merged by any repository approver when it meets all the points in the checklist\
  \ -->\n<!--- Go over all the following points, and put an `x` in all the boxes that\
  \ apply. -->\n\n- [x] The commits are squashed in a cohesive manner and have meaningful\
  \ messages.\n- [x] Testing instructions have been added in the PR body (for PRs\
  \ involving changes that are not immediately obvious).\n- [x] The developer has\
  \ manually tested the changes and verified that the changes work\n\n\n<!-- This\
  \ is an auto-generated comment: release notes by coderabbit.ai -->\n## Summary by\
  \ CodeRabbit\n\n* **New Features**\n  * Improved LLM Inference Service endpoint\
  \ selection to prefer gateway addresses matching expected hostnames and better handle\
  \ multi-gateway setups.\n\n* **Bug Fixes**\n  * More reliable endpoint fallback\
  \ behavior when no matching gateway address is found, reducing incorrect endpoint\
  \ resolution.\n\n* **Tests**\n  * Added unit tests covering hostname selection,\
  \ TLS preference, case-insensitive matching, and legacy fallback scenarios.\n<!--\
